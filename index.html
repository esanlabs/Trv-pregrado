<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>ESAN RV- Trayectoria Histórica</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>
  <a-scene>
    <a-assets>
      <img id="esan360" src="jardin_02.jpg">
      <img id="logoEsan" src="esan.png"> 
      <img id="chuwiImg" src="chuwi1.png"> 
      <video id="videoUni" src="video2.mp4" preload="auto"
             crossorigin="anonymous" playsinline webkit-playsinline></video>
    </a-assets>

    <a-sky src="#esan360" rotation="0 -90 0"></a-sky>
    
    <a-circle id="logoNadir" 
              src="#logoEsan" 
              position="0 -1.5 0" 
              rotation="-90 0 0" 
              radius="0.8" 
              material="transparent: true; opacity: 0.9; shader: flat" 
              visible="true">
    </a-circle>

    <a-entity id="estrellas" visible="false" 
              animation="property: rotation; to: 0 360 0; dur: 200000; easing: linear; loop: true">
    </a-entity>

    <a-sphere
      id="telonNegro"
      radius="60"
      material="color: #000; side: back; transparent: true; opacity: 0; shader: flat"
      animation__oscurecer="property: material.opacity; to: 1; dur: 2000; startEvents: cineStart"
      animation__aclarar="property: material.opacity; to: 0; dur: 2000; startEvents: cineEnd">
    </a-sphere>

    <a-entity id="grupoVideo" position="0 1.6 -4" visible="false">
      <a-video id="pantallaVideo" src="#videoUni" width="5" height="3"></a-video>
      <a-plane id="barraFondo" width="5" height="0.12" color="#696a6d" position="0 -1.6 0.01"></a-plane>
      <a-plane id="barraProgreso" width="0.01" height="0.12" color="#E3173E" position="-2.5 -1.6 0.02"></a-plane>
      <a-text id="textoDuracion" value="0:00 / 0:00" color="#FFFFFF" width="3" align="right" position="2.4 -1.48 0.10"></a-text>

      <a-entity id="controles" position="0 -1.9 0.2"> 
        <a-circle id="btnReset" class="clickable" color="#FFFFFF" radius="0.25" position="-1.6 0 0"
                  animation__hover="property: scale; to: 1.2 1.2 1.2; dur: 200; startEvents: mouseenter"
                  animation__leave="property: scale; to: 1 1 1; dur: 200; startEvents: mouseleave">
          <a-text value="Repetir \nvideo" align="center" color="#000000" width="2" position="0 0 0.01"></a-text>
        </a-circle>

        <a-circle id="btnNormal" class="clickable" color="#FFFFFF" radius="0.25" position="-0.8 0 0"
                  animation__hover="property: scale; to: 1.2 1.2 1.2; dur: 200; startEvents: mouseenter"
                  animation__leave="property: scale; to: 1 1 1; dur: 200; startEvents: mouseleave">
          <a-text value="1x" align="center" color="#E3173E" width="2" position="0 0 0.01"></a-text>
        </a-circle>

        <a-circle id="btnPausa" class="clickable" color="#E3173E" radius="0.25" position="0 0 0"
                  animation__hover="property: scale; to: 1.2 1.2 1.2; dur: 200; startEvents: mouseenter"
                  animation__leave="property: scale; to: 1 1 1; dur: 200; startEvents: mouseleave">
          <a-text id="txtPausa" value="Pausa" align="center" color="#FFFFFF" width="2" position="0 0 0.01"></a-text>
        </a-circle>

        <a-circle id="btnRapido" class="clickable" color="#FFFFFF" radius="0.25" position="0.8 0 0"
                  animation__hover="property: scale; to: 1.2 1.2 1.2; dur: 200; startEvents: mouseenter"
                  animation__leave="property: scale; to: 1 1 1; dur: 200; startEvents: mouseleave">
          <a-text value="2x >>" align="center" color="#E3173E" width="2" position="0 0 0.01"></a-text>
        </a-circle>

        <a-circle id="btnSalir" class="clickable" color="#E3173E" radius="0.25" position="1.6 0 0"
                  animation__hover="property: scale; to: 1.2 1.2 1.2; dur: 200; startEvents: mouseenter"
                  animation__leave="property: scale; to: 1 1 1; dur: 200; startEvents: mouseleave">
          <a-text value="Volver \nal\ninicio" align="center" color="#FFFFFF" width="2" position="0 0 0.01"></a-text>
        </a-circle>
      </a-entity>
    </a-entity>

    <a-entity id="contenedorBoton" position="0 1.6 -3" scale="0 0 0" visible="true"
              animation__aparecer="property: scale; from: 0 0 0; to: 1 1 1; dur: 6000; easing: easeInQuad; startEvents: showMenu"
              animation__inicio="property: scale; from: 0 0 0; to: 1 1 1; dur: 6000; easing: easeInQuad; delay: 500">
      
      <a-circle id="btnAccion" class="clickable" color="#000000" opacity="0.8" radius="0.65"
                animation__pulse="property: scale; to: 1.1 1.1 1.1; dur: 1000; dir: alternate; loop: true"
                animation__hover="property: scale; to: 1.2 1.2 1.2; dur: 200; startEvents: mouseenter; pauseEvents: animation__pulse"
                animation__leave="property: scale; to: 1 1 1; dur: 200; startEvents: mouseleave; resumeEvents: animation__pulse">
        <a-text id="textoBoton" value="Conoce Nuestra\nHistoria" align="center" color="#FFFFFF" width="3.5" position="0 0 0.01"></a-text>
        <a-circle id="imgChuwi" src="#chuwiImg" radius="0.5" position="0 0 0.02" visible="false" transparent="true"></a-circle>
      </a-circle>

      <a-entity id="btnJugar" class="clickable" position="0 -1.1 0"
                geometry="primitive: plane; width: 2.2; height: 0.6"
                material="transparent: true; opacity: 0"
                animation__hover="property: scale; to: 1.1 1.1 1.1; dur: 200; startEvents: mouseenter"
                animation__leave="property: scale; to: 1 1 1; dur: 200; startEvents: mouseleave">
        <a-plane width="1.8" height="0.5" color="#E3173E" material="shader: flat" position="0 0 0.01"></a-plane>
        <a-circle radius="0.25" color="#E3173E" position="-0.9 0 0.01" material="shader: flat"></a-circle>
        <a-circle radius="0.25" color="#E3173E" position="0.9 0 0.01" material="shader: flat"></a-circle>
        <a-text id="textoJugar" value="BIENVENIDO" align="center" color="#FFFFFF" width="3.5" position="0 0 0.02"></a-text>
      </a-entity>

    </a-entity>

     <a-entity id="rig" position="0 0 0">
      <a-camera look-controls wasd-controls>
        <a-cursor raycaster="objects: .clickable" 
                  animation__color="property: material.color; dir: alternate; dur: 2000; easing: linear; loop: true; to: #FF0000; from: #00FF00"
                  animation__color2="property: material.color; dir: alternate; dur: 3500; easing: linear; loop: true; to: #0000FF; from: #FFFF00">
          
          <a-sphere radius="0.006" color="#FF0000" material="shader: flat"
                    animation="property: scale; to: 1.5 1.5 1.5; dur: 500; dir: alternate; loop: true">
          </a-sphere>
        </a-cursor>
      </a-camera>

      <a-entity id="rig" position="0 0 0">
    
      <a-entity laser-controls="hand: left" 
                raycaster="objects: .clickable; far: 100" 
                line="color: #FF0000; opacity: 1">
      </a-entity>
      
      <a-entity laser-controls="hand: right" 
                raycaster="objects: .clickable; far: 100" 
                line="color: #FF0000; opacity: 1">
      </a-entity>
    </a-entity>
  </a-scene>

  <script>
    const video = document.querySelector('#videoUni');
    const grupoVideo = document.querySelector('#grupoVideo');
    const contenedorBtn = document.querySelector('#contenedorBoton');
    const textoBoton = document.querySelector('#textoBoton');
    const textoJugar = document.querySelector('#textoJugar');
    const imgChuwi = document.querySelector('#imgChuwi'); 
    const telon = document.querySelector('#telonNegro');
    const txtPausa = document.querySelector('#txtPausa');
    const barraProgreso = document.querySelector('#barraProgreso');
    const textoDuracion = document.querySelector('#textoDuracion');
    const estrellasContainer = document.querySelector('#estrellas');
    const logoNadir = document.querySelector('#logoNadir');

    let DURACION_TOTAL = 0;
    const ANCHO_BARRA = 5;

    function formatearTiempo(segundos) {
      const min = Math.floor(segundos / 60);
      const seg = Math.floor(segundos % 60);
      return `${min}:${seg.toString().padStart(2, '0')}`;
    }

    video.addEventListener('loadedmetadata', () => {
      DURACION_TOTAL = video.duration;
    });

    for (let i = 0; i < 2000; i++) {
        let estrella = document.createElement('a-sphere');
        let theta = Math.random() * Math.PI * 2;
        let phi = Math.acos((Math.random() * 2) - 1);
        let x = 50 * Math.sin(phi) * Math.cos(theta);
        let y = 50 * Math.sin(phi) * Math.sin(theta);
        let z = 50 * Math.cos(phi);
        estrella.setAttribute('position', `${x} ${y} ${z}`);
        estrella.setAttribute('radius', Math.random() * 0.08);
        estrella.setAttribute('material', 'color: #FFF; shader: flat');
        estrella.setAttribute('animation', {
            property: 'material.opacity',
            from: 0.3, to: 1,
            dur: Math.random() * 3000 + 1000,
            dir: 'alternate', loop: true
        });
        estrellasContainer.appendChild(estrella);
    }

    function actualizarInterfaz() {
      if (!DURACION_TOTAL || video.paused) return;
      const tiempoActual = video.currentTime;
      const progreso = tiempoActual / DURACION_TOTAL;
      barraProgreso.setAttribute('width', Math.max(0.01, progreso * ANCHO_BARRA));
      barraProgreso.setAttribute('position', `${-2.5 + (progreso * ANCHO_BARRA) / 2} -1.6 0.02`);
      textoDuracion.setAttribute('value', `${formatearTiempo(tiempoActual)} / ${formatearTiempo(DURACION_TOTAL)}`);
      requestAnimationFrame(actualizarInterfaz);
    }

    video.addEventListener('timeupdate', actualizarInterfaz);

    document.querySelector('#btnAccion').addEventListener('click', () => {
      if (imgChuwi.getAttribute('visible') === false) {
        contenedorBtn.setAttribute('visible', 'false');
        contenedorBtn.setAttribute('scale', '0 0 0'); 
        logoNadir.setAttribute('visible', 'false'); 
        telon.emit('cineStart'); 
        grupoVideo.setAttribute('visible', 'true');
        video.play().then(() => {
            estrellasContainer.setAttribute('visible', 'true');
            actualizarInterfaz(); 
        });
      }
    });

    function volverAlMenu() {
      video.pause();
      video.currentTime = 0;
      grupoVideo.setAttribute('visible', 'false');
      telon.emit('cineEnd'); 
      estrellasContainer.setAttribute('visible', 'false');
      textoBoton.setAttribute('visible', 'false');
      
      // CAMBIOS SOLICITADOS: Mostrar imagen Chuwi y cambiar texto del botón
      imgChuwi.setAttribute('visible', 'true');
      textoJugar.setAttribute('value', '¡JUGAR AHORA!');
      
      contenedorBtn.setAttribute('visible', 'true');
      logoNadir.setAttribute('visible', 'true'); 
      contenedorBtn.emit('showMenu');
      barraProgreso.setAttribute('width', 0.01);
      barraProgreso.setAttribute('position', '-2.5 -1.6 0.02');
    }

    document.querySelector('#btnReset').addEventListener('click', () => {
      video.currentTime = 0;
      video.play();
      txtPausa.setAttribute('value', 'Pausa');
    });

    document.querySelector('#btnSalir').addEventListener('click', volverAlMenu);
    video.addEventListener('ended', volverAlMenu);

    document.querySelector('#btnPausa').addEventListener('click', () => {
      if (video.paused) { 
        video.play(); 
        txtPausa.setAttribute('value', 'Pausa');
        actualizarInterfaz(); 
      } else { 
        video.pause(); 
        txtPausa.setAttribute('value', 'Play'); 
      }
    });

    document.querySelector('#btnNormal').addEventListener('click', () => video.playbackRate = 1);
    document.querySelector('#btnRapido').addEventListener('click', () => video.playbackRate = 4);
    
    // REDIRECCIÓN TRIVIA
    document.querySelector('#btnJugar').addEventListener('click', () => {
      window.location.href = "https://esanlabs.github.io/trivia-pregrado/";
    });
  </script>
</body>
</html>
